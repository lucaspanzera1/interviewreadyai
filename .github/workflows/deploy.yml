name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set project path
        run: echo "PROJECT_PATH=/Users/lucaspanzera/TreinaVaga" >> $GITHUB_ENV

      - name: Deploy via SSH
        run: |
          ssh -o "ProxyCommand=cloudflared access ssh --hostname %h" -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << ENDSSH
          
          PROJECT_PATH=$PROJECT_PATH
          echo "[info] Deploy automático iniciado..."
          cd TreinaVaga
          echo "[info] Fazendo git pull..."
          git pull origin main || { echo "[error] Falha no git pull"; exit 1; }
          echo "[info] Git pull concluído."
          echo "[info] Reiniciando aplicação..."
          if [ -f scripts/deploy.sh ]; then
            chmod +x scripts/deploy.sh
            echo "[debug] Executando scripts/deploy.sh..."
            ./scripts/deploy.sh || { echo "[error] Falha na execução do deploy.sh"; exit 1; }
            echo "[info] Script deploy.sh executado com sucesso."
          else
            echo "[error] scripts/deploy.sh não encontrado em $(pwd)"
            exit 1
          fi
          
          echo "[info] Deploy concluído!"
          
          ENDSSH