name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set project path
        run: echo "PROJECT_PATH=${{ secrets.PROJECT_PATH }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        run: |
          ssh -o "ProxyCommand=cloudflared access ssh --hostname %h" -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << ENDSSH
          
          PROJECT_PATH=${{ secrets.PROJECT_PATH }}
          echo "[info] Deploy automático iniciado..."
          echo "[debug] PROJECT_PATH: $PROJECT_PATH"
          cd $PROJECT_PATH
          
          echo "[info] Fazendo git pull..."
          git pull origin main
          
          echo "[info] Reiniciando aplicação..."
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
          
          echo "[info] Deploy concluído!"
          
          ENDSSH